ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.example.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/appointments"
    url = ${?DATABASE_URL}
    user = "edsa"
    user = ${?DATABASE_USER}
    password = ""
    password = ${?DATABASE_PASSWORD}
}

auth {
    apiKey = "dev-api-key"
    apiKey = ${?API_KEY}
}

notification {
    baseUrl = "http://localhost:9000"
    baseUrl = ${?NOTIFICATION_BASE_URL}
}
